<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Avenir, 'Avenir Next', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.5;
            max-width: 650px;
            margin: 0;
            padding: 2rem;
            color: #1a1a1a;
            font-size: 0.85rem;
        }

        .topics a {
            color: #1a1a1a;
            text-decoration: underline;
            display: block; /* Makes each link take its own line */
            margin-bottom: 1.5rem; /* Space between links */
            font-size: 0.85rem;
        }

        .topics a:hover {
            text-decoration: none; /* Keeps underline removed on hover */
        }

        .nav {
            margin-bottom: 2rem;
            /* Offset the tab padding/border so the first tab's text
               still aligns with the page content on the left */
            margin-left: -10px;
        }

        .nav a {
            color: #1a1a1a;
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.85rem;
            padding: 4px 9px;
            border: 1px solid transparent;
            border-radius: 2px;
        }

        .nav a:hover {
            text-decoration: none;
            border-color: #555;
        }

        .nav a.nav-home:hover {
            background-color: #8fbef4;
        }

        .nav a.nav-projects:hover {
            background-color: #fe7070;
        }

        .nav a.nav-drawings:hover {
            background-color: #77e93a;
        }

        .nav a.active {
            text-decoration: underline;
        }

        .nav a.active:hover {
            text-decoration: none;
        }

        a {
            color: #1a1a1a;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
        }

        p {
            margin-bottom: 1.5rem;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 2rem 0;
        }

        li {
            margin-bottom: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="../" class="nav-home">Home</a>
        <a href="../projects/" class="nav-projects">Projects</a>
        <a href="../drawings/" class="nav-drawings active">Drawings</a>
    </div>

    <ul class="topics">
        <li><a href="scientists">Scientists</a></li>
    </ul>
</body>
</html>
