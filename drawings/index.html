<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Avenir, 'Avenir Next', 'Nunito Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.5;
            max-width: 650px;
            margin: 0;
            padding: 2rem;
            color: #1a1a1a;
            font-size: 0.85rem;
        }

        .topics a {
            color: #1a1a1a;
            text-decoration: underline;
            display: inline-block; /* Shrink the rectangle to fit the text */
            margin-bottom: 1.5rem; /* Space between links */
            font-size: 0.85rem;
            /* Offset the padding/border so the text stays aligned with
               the rest of the page (matches the nav tab offset) */
            margin-left: -10px;
            padding: 6px 9px;
            border: 1px solid transparent;
            border-radius: 2px;
            transition: border-color .18s ease, background-color .18s ease;
        }

        /* Hovering an option draws a dark-gray rectangle filled with the Drawings tab color */
        .topics a:hover {
            text-decoration: none; /* Keeps underline removed on hover */
            border-color: #555;
            background-color: #77e93a;
        }


        .nav {
            margin-bottom: 2rem;
            /* Offset the tab padding/border so the first tab's text
               still aligns with the page content on the left */
            margin-left: -10px;
        }

        .nav a {
            color: #1a1a1a;
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.85rem;
            padding: 4px 9px;
            border: 1px solid transparent;
            border-radius: 2px;
        }

        .nav a:hover {
            text-decoration: none;
            border-color: #555;
        }

        .nav a.nav-home:hover {
            background-color: #8fbef4;
        }

        .nav a.nav-projects:hover {
            background-color: #fe7070;
        }

        .nav a.nav-drawings:hover {
            background-color: #77e93a;
        }

        .nav a.active {
            text-decoration: underline;
        }

        .nav a.active:hover {
            text-decoration: none;
        }

        a {
            color: #1a1a1a;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
        }

        p {
            margin-bottom: 1.5rem;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 2rem 0;
        }

        li {
            margin-bottom: 0.8rem;
        }
    </style>

    <style id="sticky-footer-style">
        /* Keep the copyright footer pinned to the bottom of short pages. */
        body { min-height: calc(100vh - 4rem); }
        body > footer.site-copyright { position: sticky; top: 100vh; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="../" class="nav-home">Home</a>
        <a href="../projects/" class="nav-projects">Projects</a>
        <a href="../drawings/" class="nav-drawings active">Drawings</a>
    </div>

    <ul class="topics">
        <li><a href="scientists">Scientists</a></li>
    </ul>
    <script src="../js/rectangles-toggle.js"></script>
    <script src="../js/movie-lamp.js"></script>
    <footer class="site-copyright" style="max-width:650px;margin:3rem 0 0;padding-top:1rem;border-top:1px solid #eee;font-size:0.7rem;color:#999;">
        © 2026 Furkan Ozyurt. All rights reserved.
    </footer>
</body>
</html>
