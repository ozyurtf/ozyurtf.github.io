<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Avenir, 'Avenir Next', 'Nunito Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.5;
            max-width: 650px;
            margin: 0;
            padding: 2rem;
            color: #1a1a1a;
            font-size: 0.85rem;
        }

        .nav {
            margin-bottom: 2rem;
            /* Offset the tab padding/border so the first tab's text
               still aligns with the page content on the left */
            margin-left: -10px;
        }

        .nav a {
            color: #1a1a1a;
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.85rem;
            padding: 4px 9px;
            border: 1px solid transparent;
            border-radius: 2px;
        }

        .nav a:hover {
            text-decoration: none;
            border-color: #555;
        }

        .nav a.nav-home:hover {
            background-color: #8fbef4;
        }

        .nav a.nav-projects:hover {
            background-color: #fe7070;
        }

        .nav a.nav-drawings:hover {
            background-color: #77e93a;
        }

        .nav a.active {
            text-decoration: underline;
        }

        .nav a.active:hover {
            text-decoration: none;
        }

        /* Grid layout for images */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .image-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
        }

        /* Modal for enlarged images */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            /* Sit above the rectangles toggle button (z-index 1000) so the
               colored swatch is not visible over the enlarged image */
            z-index: 2000;
        }

        .modal img {
            max-width: 90%;
            max-height: 90vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .modal-caption {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: #d1d5db;
            font-size: 1rem;
            letter-spacing: 0.02em;
            background: rgba(0, 0, 0, 0.55);
            padding: 0.45rem 0.8rem;
            border-radius: 0;
            display: none;
        }

        .modal-caption.show {
            display: block;
        }

        .modal.show {
            display: block;
        }
    </style>

    <style id="sticky-footer-style">
        /* Keep the copyright footer pinned to the bottom of short pages. */
        body { min-height: calc(100vh - 4rem); }
    </style>
</head>
<body>
    <div class="nav">
        <a href="../../" class="nav-home">Home</a>
        <a href="../../projects/" class="nav-projects">Projects</a>
        <a href="../../drawings/" class="nav-drawings">Drawings</a>
    </div>

    <div class="image-grid">
        <img src="./newton.jpeg" alt="Newton" onclick="enlargeImage(this.src, this.dataset.title || '')">
        <img src="./einstein.jpeg" alt="Einstein" onclick="enlargeImage(this.src, this.dataset.title || '')">
        <img src="./tesla.jpeg" alt="Tesla" data-title="2H 6B 10th Attempt Imperfect Tesla" onclick="enlargeImage(this.src, this.dataset.title || this.alt)">
        
    </div>

    <!-- Modal for enlarged images -->
    <div class="modal" onclick="this.classList.remove('show')">
        <img id="enlarged-image" src="" alt="Enlarged image">
        <div id="modal-caption" class="modal-caption"></div>
    </div>

    <script>
        function enlargeImage(src, title) {
            const modal = document.querySelector('.modal');
            const enlargedImg = document.getElementById('enlarged-image');
            const caption = document.getElementById('modal-caption');
            enlargedImg.src = src;
            caption.textContent = title;
            caption.classList.toggle('show', Boolean(title));
            modal.classList.add('show');
        }

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelector('.modal').classList.remove('show');
            }
        });
    </script>
    <script src="../../js/rectangles-toggle.js"></script>
    <script src="../../js/movie-lamp.js"></script>
</body>
</html>
