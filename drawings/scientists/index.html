<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Avenir, 'Avenir Next', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.5;
            max-width: 650px;
            margin: 0;
            padding: 2rem;
            color: #1a1a1a;
            font-size: 0.85rem;
        }

        .nav {
            margin-bottom: 2rem;
        }

        .nav a {
            color: #1a1a1a;
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.85rem;
        }

        .nav a:hover {
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
        }

        .nav a.active {
            text-decoration: underline;
        }

        /* Grid layout for images */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .image-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
        }

        /* Modal for enlarged images */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.9rem;
            max-width: 92vw;
        }

        .modal img {
            max-width: 90%;
            max-height: 78vh;
            border-radius: 6px;
        }

        .modal-caption {
            color: #d1d5db;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            background: rgba(17, 24, 39, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.14);
            padding: 0.5rem 0.9rem;
            border-radius: 6px;
            text-align: center;
            display: none;
        }

        .modal-caption.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="../../">Home</a>
        <a href="../../neuroscience/">Neuroscience</a>
        <a href="../../theoretical-ai/">Theoretical AI</a>
        <a href="../../projects/">Projects</a>
        <a href="../../drawings/">Drawings</a>
    </div>

    <div class="image-grid">
        <img src="./newton.jpeg" alt="Newton" onclick="enlargeImage(this.src, this.dataset.title || '')">
        <img src="./einstein.jpeg" alt="Einstein" onclick="enlargeImage(this.src, this.dataset.title || '')">
        <img src="./tesla.jpeg" alt="Tesla" data-title="2H 5th Attempt Incomplete Tesla" onclick="enlargeImage(this.src, this.dataset.title || '')">
        
    </div>

    <!-- Modal for enlarged images -->
    <div class="modal" onclick="this.classList.remove('show')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="enlarged-image" src="" alt="Enlarged image">
            <div id="modal-caption" class="modal-caption"></div>
        </div>
    </div>

    <script>
        function enlargeImage(src, title) {
            const modal = document.querySelector('.modal');
            const enlargedImg = document.getElementById('enlarged-image');
            const caption = document.getElementById('modal-caption');
            enlargedImg.src = src;
            caption.textContent = title;
            caption.classList.toggle('show', Boolean(title));
            modal.classList.add('show');
        }

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelector('.modal').classList.remove('show');
            }
        });
    </script>
</body>
</html>
